<!DOCTYPE HTML>
<html>
<head>
  <title>爱心代码</title>
  <meta name="Generator" content="EditPlus">
  <meta name="Author" content="">
  <meta name="Keywords" content="">
  <meta name="Description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    html, body {
      height: 100%;
      padding: 0;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    }
    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .typing-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f8bbd0;
      font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      font-size: 16px;
      text-align: center;
      z-index: 10;
      max-width: 85%;
      line-height: 1.8;
      text-shadow: 
        0 0 5px #fff, 
        0 0 10px #fff, 
        0 0 15px #ff69b4, 
        0 0 20px #ff69b4, 
        0 0 25px #ff69b4, 
        0 0 30px #ff69b4, 
        0 0 35px #ff69b4;
      padding: 15px;
      box-sizing: border-box;
      background: transparent; /* 完全透明背景 */
    }

    .typing-cursor {
      display: inline-block;
      width: 6px;
      height: 1.2em;
      background-color: #f8bbd0;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s infinite;
      box-shadow: 0 0 5px #fff, 0 0 10px #ff69b4;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>

<body>
  <canvas id="pinkboard"></canvas>
  <div id="typingContainer" class="typing-text">
    <span id="typedText"></span><span id="cursor" class="typing-cursor"></span>
  </div>
  <script>
    var settings = {
      particles: {
        length:   400,
        duration:   2,
        velocity: 100,
        effect: -0.75,
        size:      30, // 进一步减小爱心大小
      },
      rain: {
        length:     1200,  // 减少雨滴数量
        velocity:   130,
        spread:     0.5,
        frequency:  1.0,  // 降低生成频率
        size:       20    // 减小爱心雨大小
      }
    };
     
    (function(){
      var b=0;
      var c=["ms","moz","webkit","o"];
      for(var a=0;a<c.length&&!window.requestAnimationFrame;++a){
        window.requestAnimationFrame=window[c[a]+"RequestAnimationFrame"];
        window.cancelAnimationFrame=window[c[a]+"CancelAnimationFrame"]||window[c[a]+"CancelRequestAnimationFrame"]
      }
      if(!window.requestAnimationFrame){
        window.requestAnimationFrame=function(h,e){
          var d=new Date().getTime();
          var f=Math.max(0,16-(d-b));
          var g=window.setTimeout(function(){h(d+f)},f);
          b=d+f;
          return g
        }
      }
      if(!window.cancelAnimationFrame){
        window.cancelAnimationFrame=function(d){clearTimeout(d)}
      }
    }());
     
    var Point = (function() {
      function Point(x, y) {
        this.x = (typeof x !== 'undefined') ? x : 0;
        this.y = (typeof y !== 'undefined') ? y : 0;
      }
      Point.prototype.clone = function() {
        return new Point(this.x, this.y);
      };
      Point.prototype.length = function(length) {
        if (typeof length == 'undefined')
          return Math.sqrt(this.x * this.x + this.y * this.y);
        this.normalize();
        this.x *= length;
        this.y *= length;
        return this;
      };
      Point.prototype.normalize = function() {
        var length = this.length();
        this.x /= length;
        this.y /= length;
        return this;
      };
      return Point;
    })();
     
    var Particle = (function() {
      function Particle() {
        this.position = new Point();
        this.velocity = new Point();
        this.acceleration = new Point();
        this.age = 0;
      }
      Particle.prototype.initialize = function(x, y, dx, dy) {
        this.position.x = x;
        this.position.y = y;
        this.velocity.x = dx;
        this.velocity.y = dy;
        this.acceleration.x = dx * settings.particles.effect;
        this.acceleration.y = dy * settings.particles.effect;
        this.age = 0;
      };
      Particle.prototype.update = function(deltaTime) {
        this.position.x += this.velocity.x * deltaTime;
        this.position.y += this.velocity.y * deltaTime;
        this.velocity.x += this.acceleration.x * deltaTime;
        this.velocity.y += this.acceleration.y * deltaTime;
        this.age += deltaTime;
      };
      Particle.prototype.draw = function(context, image) {
        function ease(t) {
          return (--t) * t * t + 1;
        }
        var size = image.width * ease(this.age / settings.particles.duration);
        context.globalAlpha = 1 - this.age / settings.particles.duration;
        context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
      };
      return Particle;
    })();

    var ParticlePool = (function() {
      var particles,
          firstActive = 0,
          firstFree   = 0,
          duration    = settings.particles.duration;
      
      function ParticlePool(length) {
        particles = new Array(length);
        for (var i = 0; i < particles.length; i++)
          particles[i] = new Particle();
      }
      ParticlePool.prototype.add = function(x, y, dx, dy) {
        particles[firstFree].initialize(x, y, dx, dy);
        
        firstFree++;
        if (firstFree   == particles.length) firstFree   = 0;
        if (firstActive == firstFree       ) firstActive++;
        if (firstActive == particles.length) firstActive = 0;
      };
      ParticlePool.prototype.update = function(deltaTime) {
        var i;
        
        if (firstActive < firstFree) {
          for (i = firstActive; i < firstFree; i++)
            particles[i].update(deltaTime);
        }
        if (firstFree < firstActive) {
          for (i = firstActive; i < particles.length; i++)
            particles[i].update(deltaTime);
          for (i = 0; i < firstFree; i++)
            particles[i].update(deltaTime);
        }
        
        while (particles[firstActive].age >= duration && firstActive != firstFree) {
          firstActive++;
          if (firstActive == particles.length) firstActive = 0;
        }
      };
      ParticlePool.prototype.draw = function(context, image) {
        if (firstActive < firstFree) {
          for (i = firstActive; i < firstFree; i++)
            particles[i].draw(context, image);
        }
        if (firstFree < firstActive) {
          for (i = firstActive; i < particles.length; i++)
            particles[i].draw(context, image);
          for (i = 0; i < firstFree; i++)
            particles[i].draw(context, image);
        }
      };
      return ParticlePool;
    })();

    var RainParticlePool = (function() {
      var particles,
          firstActive = 0,
          firstFree   = 0;
      
      function RainParticlePool(length) {
        particles = new Array(length);
        for (var i = 0; i < particles.length; i++)
          particles[i] = new Particle();
      }
      
      RainParticlePool.prototype.addRaindrop = function(canvasWidth) {
        var x = Math.random() * canvasWidth;
        var horizontalDrift = (Math.random() - 0.5) * 2 * settings.rain.spread * settings.rain.velocity;
        
        this.add(x, -settings.rain.size, horizontalDrift, settings.rain.velocity);
      };
      
      RainParticlePool.prototype.update = function(deltaTime, canvasHeight) {
        var i;
        
        if (firstActive < firstFree) {
          for (i = firstActive; i < firstFree; i++) {
            particles[i].update(deltaTime);
            if (particles[i].position.y > canvasHeight + settings.rain.size) {
              particles[i].age = settings.particles.duration;
            }
          }
        }
        if (firstFree < firstActive) {
          for (i = firstActive; i < particles.length; i++) {
            particles[i].update(deltaTime);
            if (particles[i].position.y > canvasHeight + settings.rain.size) {
              particles[i].age = settings.particles.duration;
            }
          }
          for (i = 0; i < firstFree; i++) {
            particles[i].update(deltaTime);
            if (particles[i].position.y > canvasHeight + settings.rain.size) {
              particles[i].age = settings.particles.duration;
            }
          }
        }
        
        while (particles[firstActive].age >= settings.particles.duration && firstActive != firstFree) {
          firstActive++;
          if (firstActive == particles.length) firstActive = 0;
        }
      };
      
      RainParticlePool.prototype.add = ParticlePool.prototype.add;
      RainParticlePool.prototype.draw = ParticlePool.prototype.draw;
      
      return RainParticlePool;
    })();

    function typeWriter(text, elementId, cursorId, speed = 50) {
      let i = 0;
      const txt = text;
      const txtElement = document.getElementById(elementId);
      const cursorElement = document.getElementById(cursorId);
      
      function type() {
        if (i < txt.length) {
          txtElement.innerHTML += txt.charAt(i);
          i++;
          setTimeout(type, speed);
        } else {
          cursorElement.style.display = 'none';
        }
      }
      
      type();
    }

    window.onload = function() {
      const typingText = "我宋宇涵，是这个世界上最厉害、最耀眼的人，所有人都满心欢喜地喜欢我。我家境优渥、富贵无忧，身边围绕着无数追捧我的小迷弟与小迷妹。\n\n其中有一个名叫ww的小迷弟，他满心满眼都是我，爱我爱得死去活来。可我并不喜欢他，依旧天天欺负他、冷落他，就算这样，他也依旧死心塌地、满心欢喜地偏爱我。";
      typeWriter(typingText, "typedText", "cursor", 50);
    };

    (function(canvas) {
      var context = canvas.getContext('2d'),
          particles = new ParticlePool(settings.particles.length),
          rainParticles = new RainParticlePool(settings.rain.length),
          particleRate = settings.particles.length / settings.particles.duration,
          rainRate = settings.rain.frequency,
          lastRainTime = 0,
          time;
      
      function pointOnHeart(t) {
        return new Point(
          100 * Math.pow(Math.sin(t), 3),
          75 * Math.cos(t) - 30 * Math.cos(2 * t) - 12 * Math.cos(3 * t) - 6 * Math.cos(4 * t) + 15
        );
      }
      
      var image = (function() {
        var canvas  = document.createElement('canvas'),
            context = canvas.getContext('2d');
        canvas.width  = settings.particles.size;
        canvas.height = settings.particles.size;
        function to(t) {
          var point = pointOnHeart(t);
          point.x = settings.particles.size / 2 + point.x * settings.particles.size / 350;
          point.y = settings.particles.size / 2 - point.y * settings.particles.size / 350;
          return point;
        }
        context.beginPath();
        var t = -Math.PI;
        var point = to(t);
        context.moveTo(point.x, point.y);
        while (t < Math.PI) {
          t += 0.01;
          point = to(t);
          context.lineTo(point.x, point.y);
        }
        context.closePath();
        context.fillStyle = '#ea80b0';
        context.fill();
        var image = new Image();
        image.src = canvas.toDataURL();
        return image;
      })();
      
      function render() {
        requestAnimationFrame(render);
        
        var newTime   = new Date().getTime() / 1000,
            deltaTime = newTime - (time || newTime);
        time = newTime;
        
        context.clearRect(0, 0, canvas.width, canvas.height);
        
        var amount = particleRate * deltaTime;
        for (var i = 0; i < amount; i++) {
          var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
          var dir = pos.clone().length(settings.particles.velocity);
          particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
        }
        
        particles.update(deltaTime);
        particles.draw(context, image);
        
        if (time - lastRainTime > 1 / rainRate) {
          rainParticles.addRaindrop(canvas.width);
          lastRainTime = time;
        }
        
        rainParticles.update(deltaTime, canvas.height);
        var rainImage = document.createElement('canvas');
        rainImage.width = settings.rain.size;
        rainImage.height = settings.rain.size;
        var rainCtx = rainImage.getContext('2d');
        rainCtx.drawImage(image, 0, 0, settings.rain.size, settings.rain.size);
        
        rainParticles.draw(context, rainImage);
      }
      
      function onResize() {
        canvas.width  = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
      }
      window.onresize = onResize;
      
      setTimeout(function() {
        onResize();
        render();
      }, 10);
    })(document.getElementById('pinkboard'));
  </script>
</body>
</html>
